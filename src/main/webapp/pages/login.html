<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Platter Premium Food Delivery</title>

    <!-- Stylesheets -->
    <link rel="stylesheet" href="../css/login.css">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>

<body>



    <main class="auth-container">

        <!-- Form Area (Centered layout) -->
        <section class="auth-form-side">
            <div class="form-container">

                <!-- Brand Header -->
                <div class="logo-container">
                    <div class="logo-icon">
                        <!-- Custom Cloche SVG -->
                        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M12 4C11.45 4 11 4.45 11 5C11 5.3 11.13 5.57 11.34 5.76C7.22 6.27 4 9.76 4 14H20C20 9.76 16.78 6.27 12.66 5.76C12.87 5.57 13 5.3 13 5C13 4.45 12.55 4 12 4Z"
                                fill="#F4B400" />
                            <path
                                d="M3 16C3 15.45 3.45 15 4 15H20C20.55 15 21 15.45 21 16C21 16.55 20.55 17 20 17H4C3.45 17 3 16.55 3 16Z"
                                fill="#F4B400" />
                        </svg>
                    </div>
                    <span class="logo-text">Platter</span>
                    <span class="logo-tagline">Good Food, Great Mood</span>
                </div>

                <header class="auth-header">
                    <h1>Welcome Back 👋</h1>
                    <p class="subtitle">Login to continue to Platter</p>
                </header>

                <!-- Form -->
                <form id="login-form" class="auth-form" novalidate>

                    <!-- Alert Message Container -->
                    <div id="alert-box" class="alert-box hidden"></div>

                    <!-- Email Field -->
                    <div class="input-group">
                        <label for="email">Email Address</label>
                        <div class="input-wrapper">
                            <i class="fa-regular fa-envelope input-icon"></i>
                            <input type="email" id="email" name="email" placeholder="Enter your email" required>
                        </div>
                    </div>

                    <!-- Password Field -->
                    <div class="input-group">
                        <label for="password">Password</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-lock input-icon"></i>
                            <input type="password" id="password" name="password" placeholder="Enter your password"
                                required>
                            <button type="button" id="toggle-password" class="password-toggle"
                                aria-label="Toggle password visibility">
                                <i class="fa-regular fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Actions Row -->
                    <div class="auth-actions">
                        <label class="checkbox-container">
                            <input type="checkbox" id="remember-me" name="remember">
                            <span class="checkmark"></span>
                            Remember Me
                        </label>
                        <a href="#" class="forgot-link">Forgot Password?</a>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" class="submit-btn">
                        <span>Login</span>
                        <i class="fa-solid fa-arrow-right btn-arrow"></i>
                    </button>

                    <!-- Divider -->
                    <div class="divider">
                        <span>or continue with</span>
                    </div>

                    <!-- Google Button -->
                    <button type="button" class="google-btn">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg"
                            alt="Google logo">
                        <span>Continue with Google</span>
                    </button>

                </form>

                <!-- Footer Link -->
                <footer class="auth-footer">
                    <p>Don't have an account? <a href="signup.html">Sign Up</a></p>
                </footer>

            </div>
        </section>

    </main>

    <!-- Footer Copyright -->
    <div class="page-footer-copyright">
        &copy; 2024 Platter. All rights reserved.
    </div>

    <!-- Scripts -->
    <script src="../js/login.js"></script>

</body>

</html>
